<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin - OrderBox</title><link rel="stylesheet" href="/style.css"></head>
<body class="admin-page">
  <aside class="sidebar"><div class="brand big"><span class="logo">OB</span><div><b>OrderBox</b><small>Panel administrador</small></div></div><a href="#dashboard">Dashboard</a><a href="#categories">Categorias</a><a href="#products">Productos</a><a href="#extras">Extras</a><a href="#tables">Mesas</a><a href="#history">Historial</a><a href="#settings">Configuracion</a></aside>
  <main class="admin-main">
    <section id="dashboard"><h1>Dashboard</h1><div id="stats" class="stats-grid"></div></section>

    <section id="categories" class="panel"><div class="section-title"><h2>Categorias</h2><span class="pill">Agrupacion del menu</span></div>
      <div class="form-grid"><input id="cid" type="hidden"><input id="cname" placeholder="Nombre categoria"><label><input id="cactive" type="checkbox" checked> Activa</label><button class="primary" onclick="saveCategory()">Guardar categoria</button></div>
      <div id="categoriesList" class="admin-list"></div>
    </section>

    <section id="products" class="panel"><div class="section-title"><h2>Productos</h2><span class="pill">Imagen por producto</span></div>
      <div class="form-grid"><input id="pname" placeholder="Nombre"><input id="pprice" type="number" placeholder="Precio"><select id="pcategoryId"></select><input id="pimage" placeholder="Imagen: /img/burger.svg"><input id="pfile" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml"><input id="pdescription" class="span2" placeholder="Descripcion"><label><input id="pactive" type="checkbox" checked> Activo</label><button class="primary" onclick="saveProduct()">Guardar producto</button></div>
      <div id="productsList" class="admin-list"></div>
    </section>

    <section id="extras" class="panel"><div class="section-title"><h2>Extras</h2><span class="pill">Por producto</span></div>
      <div class="form-grid"><input id="eid" type="hidden"><select id="eproductId"></select><input id="ename" placeholder="Nombre extra"><input id="eprice" type="number" placeholder="Precio"><label><input id="eactive" type="checkbox" checked> Activo</label><button class="primary" onclick="saveExtra()">Guardar extra</button></div>
      <div id="extrasList" class="admin-list"></div>
    </section>

    <section id="tables" class="panel"><h2>Mesas y URLs</h2><div class="form-grid"><input id="tid" placeholder="ID mesa"><input id="tname" placeholder="Nombre"><label><input id="tlocked" type="checkbox"> Bloqueada</label><button class="primary" onclick="saveTable()">Guardar mesa</button></div><div id="tablesList" class="admin-list"></div></section>

    <section id="history" class="panel"><h2>Historial</h2><div class="form-grid"><select id="filterStatus" onchange="renderHistory()"><option value="">Todos los estados</option><option>RECEIVED</option><option>PREPARING</option><option>READY</option><option>DELIVERED</option><option>CANCELLED</option></select><input id="filterTable" oninput="renderHistory()" placeholder="Mesa"><input id="filterText" oninput="renderHistory()" placeholder="Buscar texto"></div><div id="historyList" class="admin-list"></div></section>

    <section id="settings" class="panel"><h2>Configuracion y backup</h2><div class="form-grid"><input id="businessName" placeholder="Nombre negocio"><input id="apSsid" placeholder="SSID AP"><input id="apPassword" placeholder="Password AP"><label><input id="counterModeEnabled" type="checkbox"> Modo contador</label><button class="primary" onclick="saveSettings()">Guardar configuracion</button><button onclick="exportBackup()">Exportar backup</button><input id="backupFile" type="file" accept="application/json"><button onclick="importBackup()">Importar backup</button><button class="danger-btn" onclick="resetData()">Reset demo</button></div></section>
  </main>
  <script src="/admin.js"></script>
</body>
</html>
