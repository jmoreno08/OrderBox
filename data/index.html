<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrderBox - Cliente</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <section class="card header">
      <h1>OrderBox</h1>
      <p id="sourceLabel">Cargando...</p>
    </section>

    <section class="card">
      <h2>Menú</h2>
      <div id="menu" class="menu"></div>
    </section>

    <section class="card">
      <h2>Carrito</h2>
      <div id="cart"></div>
      <div class="total">
        Total: <strong id="total">$0</strong>
      </div>
      <button id="sendOrderBtn">Enviar pedido</button>
      <p id="message"></p>
    </section>
  </main>

  <script src="/customer.js"></script>
</body>
</html>
